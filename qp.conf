#
# $QP_CONF
# /etc/qp.conf
# ~/.config/qp/qp.conf
#
# See the qp.conf(5) manpage for options
#

#
# GENERAL OPTIONS
#
[options]
PgpFetch
Devel
Provides
DevelSuffixes = -git -cvs -svn -bzr -darcs -always -hg -fossil
#AurOnly
#BottomUp
#RemoveMake
#SudoLoop
#UseAsk
#SaveChanges
#CombinedUpgrade
#CleanAfter
#UpgradeMenu
#NewsOnUpgrade

#LocalRepo
#Chroot
#Sign
#SignDb
#KeepRepoCache

# Build official packages from source instead of downloading binaries
#BuildOfficialFromSource

#
# BINARY OPTIONS
#
#[bin]
#FileManager = vifm
#MFlags = --skippgpcheck
#Sudo = doas

#
# OVERLAY PKGBUILD REPOSITORIES
#
# Priority: lower number = higher priority (1 is highest, 0 = always ask)
#
#[my-overlay]
#Url = https://github.com/user/pkgbuilds.git
#Priority = 1
#OverrideOfficial

#[local-dev]
#Path = /home/user/my-pkgbuilds
#Priority = 2
